<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
        <style>
            html * {
                box-sizing: border-box;
            }
            #main { 
                font-family: sans-serif;
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            select, .selected-box {
                width: 100%;
                max-width: 400px;
                padding: 8px 12px;
                border-radius: 4px;
                border: 1px solid #ccc;
                background-color: white;
            }
            label {
                font-weight: bold;
                font-size: 14px;
                margin-top: 5px; 
            }
            #debug-info { 
                margin-top: 10px;
                font-size: 11px;
                color: #d9534f;
            }
            #assessor { 
                display: none
            }
            .selected-box {
                cursor: text;
                display: flex;
                flex-wrap: wrap;
            }
            .selected-box input {
                width: 100%;
                border: none;
                outline: none;
                flex: 1;
            }
            .dropdown {
                position: absolute;
                width: 400px;
                border: 1px solid #ccc;
                max-height: 200px;
                overflow-y: auto;
                background: white;
                display: none;
                z-index: 1000;
            }
            .option {
                padding: 6px;
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
            }
            .option:hover {
                background: #f0f0f0;
            }
        </style>
    </head>
    <body>
        <div id="main">
            <input type="email" id="assessor" name="assessor">

            <label for="groups">Select a Group:</label>
            <select name="groups" id="groups">
                <option value="">-- Loading Groups... --</option>
            </select>

            <label for="forms">Select a Form:</label>
            <select name="forms" id="forms" disabled>
                <option value="" selected>-- Select a Group First --</option>
            </select>

            <!-- <label for="users-mult">Select User(s):</label>
            <select name="users-mult" id="users-mult" multiple size="1" listbox="true" disabled>
                <option value="">-- Select a Group First --</option>
            </select> -->

            <label for="users">Select User(s):</label>
            <div class="multiselect">
                <div class="selected-box" id="users-selected-box">
                    <input type="text" name="users" id="users-search-input" placeholder="Select users..." disabled>
                </div>
                <div class="dropdown" id="users-dropdown"></div>
            </div>
        </div>

        <script type="text/javascript">
            
            // --- CONFIGURATION ---
            const WORKATO_GROUPS_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/groups";
            const WORKATO_USER_GROUPS_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/user-groups"
            const WORKATO_USERS_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/groups/users";
            const WORKATO_ON_SUBMIT_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/form";
            const WORKATO_API_TOKEN = "b2250c7091ab1096be02367b2304c9b427542f660a61433865bb3d9c0b6a8a65";

            const selected = new Map();
            let options = [];

            // --- API CALLS ---

            async function getGroups() {
                try {
                    const res = await fetch(WORKATO_GROUPS_URL, { 
                        method: 'GET',
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        }
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const rawData = await res.json();
                    return rawData.Groups || []; 

                } catch(error) {
                    console.error("Group Fetch Failed:", error);
                    return [];
                }
            }

            async function getUserGroups(email) {
                try {
                    const res = await fetch(`${WORKATO_USER_GROUPS_URL}?email=${email}`, { 
                        method: 'GET',
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        }
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const rawData = await res.json();
                    return rawData.Groups || []; 

                } catch(error) {
                    console.error("User Group Fetch Failed:", error);
                    return [];
                }
            }

            async function getUsers(groupId) {
                try {
                    const workatoUsersEndpoint = `${WORKATO_USERS_URL}?groupId=${groupId}`;
                    const res = await fetch(workatoUsersEndpoint, { 
                        method: 'GET',
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const userData = await res.json();
                    return userData.Users || []; 

                } catch(error) {
                    console.error("User Fetch Failed:", error);
                    return [];
                }
            }

            // async function sendFormData(data) {

            //             method: "POST",
            //             headers: {
            //                 'api-token': WORKATO_API_TOKEN,

            //             },
            //             body: JSON.stringify({ 
            //                 user_id: data.userId,
            //                 group_id: data.groupId
            //             })
            //         });

            //         if (!res.ok) throw new Error(`HTTP ${res.status}`);
            //         return res.json();
            //     } catch(error) {
            //         console.error("Form data export failed:", error);
            //         return [];

            // --- UI HELPERS ---
            
            function populateDropdown(element, data, type) {
                element.innerHTML = `<option value="">-- Select a ${type} --</option>`;
                
                if (!data || data.length === 0) {
                    element.innerHTML = `<option value="">No ${type}s found</option>`;
                    return;
                }

                data.forEach(item => {
                    const opt = document.createElement('option');
                    switch(type) {
                        case "Form":
                            opt.value = item;
                            opt.text = item;
                        break;
                        case "User":
                            opt.value = item.id;
                            opt.text = `${item.mail} (${item.external_id})`;
                        break;
                        default:
                            opt.value = item._id;
                            opt.text = item.name;
                    }
                    element.appendChild(opt);
                });
                
                element.disabled = false;
            }

            function renderDropdown(dropdown, input, filter = "") {
                dropdown.innerHTML = "";

                const filtered = options.filter(opt =>
                    opt.mail.toLowerCase().includes(filter.toLowerCase()) ||
                    opt.external_id.toLowerCase().includes(filter.toLowerCase())
                );

                filtered.forEach(opt => {
                    const div = document.createElement("div");
                    div.className = "option";

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.checked = selected.has(opt.id);

                    const label = document.createElement("span");
                    label.textContent = `${opt.mail} (${opt.external_id})`;

                    // Toggle function
                    const toggle = () => {
                    if (selected.has(opt.id)) {
                        selected.delete(opt.id);
                        checkbox.checked = false;
                    } else {
                        selected.set(opt.id, opt.mail);
                        checkbox.checked = true;
                    }
                    updateInputDisplay(input);
                    };

                    // Clicking the whole row toggles
                    div.addEventListener("click", (e) => {
                        // Prevent double toggle when clicking checkbox directly
                        if(e.target.tagName !== "INPUT") {
                            toggle();
                        }
                        JFCustomWidget.setFieldsValueByLabel([
                            { label: "Learner", value: selected.map(op => op.mail) }
                        ]);
                    });

                    checkbox.addEventListener("change", toggle);

                    div.appendChild(checkbox);
                    div.appendChild(label);
                    dropdown.appendChild(div);
                });

                dropdown.style.display = filtered.length ? "block" : "none";
            }

            function updateInputDisplay(input) {
                const count = selected.size;

                if (count === 0) {
                    input.value = "";
                    input.placeholder = "Select users...";
                } else {
                    input.value = `${count} selected`;
                }
            }

            // --- JOTFORM WIDGET INITIALIZATION ---

            JFCustomWidget.subscribe("ready", async function(data) {
                // WIDGET ELEMENTS //
                const assessorInput = document.querySelector('#assessor');
                const groupSelect = document.querySelector('#groups');
                // const usersMultSelect = document.querySelector('#users-mult');
                const usersDropdown = document.getElementById("users-dropdown");
                const usersInput = document.getElementById("users-search-input");
                const usersSelectedBox = document.getElementById("users-selected-box");
                const formSelect = document.querySelector('#forms');

                // Store prefilled email into widget
                JFCustomWidget.getFieldsValueByName(["assessor"], async function(res) {
                    items = (res && res.data) || [];
                    const groups = await getUserGroups(items[0].value);
                    populateDropdown(groupSelect, groups, "Group");
                });

                groupSelect.addEventListener('change', async function() {
                    const selectedGroupId = this.value;
                    
                    if (!selectedGroupId) {
                        usersInput.disabled = true;
                        usersInput.innerHTML = '<option value="">-- Select a Group First --</option>';
                        return;
                    }

                    formSelect.disabled = true;
                    formSelect.innerHTML = '<option value="">Loading forms...</option>';
                    populateDropdown(formSelect, ["Pump Truck On The Job", "Personal Hygiene and Health"], "Form");
                    
                    usersInput.disabled = true;
                    usersInput.innerHTML = '<option value="">Loading users...</option>';
                    options = await getUsers(selectedGroupId);
                    renderDropdown(usersDropdown, usersInput, "");
                    usersInput.disabled = false;
                });

                formSelect.addEventListener('change', async function() {
                    JFCustomWidget.setFieldsValueByLabel([
                        { label: "Form", value: formSelect.value }
                    ]);
                });
                
                usersInput.addEventListener("focus", () => {
                    usersInput.value = "";
                    renderDropdown(usersDropdown, usersInput, "");
                });

                usersInput.addEventListener("input", () => {
                    renderDropdown(usersDropdown, usersInput, usersInput.value);
                });

                usersInput.addEventListener('change', async function() {
                    JFCustomWidget.setFieldsValueByLabel([
                        // { label: "Learner", value: usersInput.value }
                        { label: "Learner", value: selected.map(op => op.mail) }
                        // { label: "Learner", value: [...usersInput.selectedOptions].map(op => op.text) }
                    ]);
                });

                // 3. Handle Form Submission
                JFCustomWidget.subscribe("submit", async function() {
                    const formData = {
                        assessor: assessorInput.value || "",
                        userId: [...usersInput.selectedOptions].map(op => op.text) || [],
                        groupId: groupSelect.value || ""
                    }
                    const selectedValue = [...usersInput.selectedOptions].map(op => op.text);
                    const result = {
                        valid: !!selectedValue,
                        value: selectedValue ? JSON.stringify(formData) : "" // This saves the User _id to the Jotform submission
                    };
                    // Send results to Workato
                    // if(result.valid) {
                    //     let submission = await sendFormData(formData);
                    // }
                    JFCustomWidget.sendSubmit(result);
                });
            });

        </script>
    </body>
</html>
