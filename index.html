<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://serratus.github.io/quaggaJS/examples/js/quagga.min.js"></script>
        <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
        <style>
            html * {
                box-sizing: border-box;
                margin: 0;
                font-family: sans-serif;
            }
            body div {
                padding-bottom: 1rem;
            }
            select, .selected-box {
                width: 100%;
                max-width: 400px;
                padding: 8px 12px;
                border-radius: 4px;
                border: 1px solid #ccc;
                background-color: white;
            }
            label {
                font-weight: bold;
                font-size: 14px;
                margin-top: 5px; 
            }
            button {
                margin: 4px;
                padding: 10px 20px;
                font-size: 16px;
                border: 1px solid black;
                border-radius: 8px;
            }
            button:hover {
                background-color: #c0c0c0cb;
            }
            button:active {
                background-color: #a8a8a8cb;
            }
            #main {
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            #assessor { 
                display: none
            }
            #scanner {
                max-width: 400px;
                max-height: max-content;
                background: white;
            }
            #scanner video {
                width: 100%;
                height: auto;
                position: relative;
                z-index: 0;
            }
            #scanner canvas {
                display: none;
            }
            #result {
                margin-top: 10px;
                font-size: 18px;
                font-weight: bold;
            } 
            #barcode-id {
                padding: 4px 12px 12px 12px;
            }
            .selected-box {
                cursor: text;
                display: flex;
                flex-wrap: wrap;
            }
            .selected-box input {
                width: 100%;
                border: none;
                outline: none;
                flex: 1;
            }
            .dropdown {
                position: absolute;
                width: 400px;
                border: 1px solid #ccc;
                max-height: 200px;
                overflow-y: auto;
                background: white;
                display: none;
                z-index: 1000;
            }
            .option {
                padding: 6px;
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
            }
            .option:hover {
                background: #f0f0f0;
            }
        </style>
    </head>
    <body>
        <div id="main">
            <input type="email" id="assessor" name="assessor">

            <label for="groups">Select a Group:</label>
            <select name="groups" id="groups">
                <option value="">-- Loading Groups... --</option>
            </select>

            <label for="forms">Select a Form:</label>
            <select name="forms" id="forms" disabled>
                <option value="" selected>-- Select a Group First --</option>
            </select>

            <div id="barcode-control">
                <button id="start-scan">Scan Barcode</button>
                <button id="scan-mode" onclick="toggleMode()">Mode: <span id="mode-label">Auto</span></button>
                <button id="scan-capture" onclick="manualCapture()" style="display:none;">Capture</button>
                <button id="add-user" style="display:none;">Add User</button>
            </div>
            <div id="scanner"></div>
            <div id="result">No scan yet</div>

            <label for="users">Select User(s):</label>
            <div class="multiselect">
                <div class="selected-box" id="users-selected-box">
                    <input type="text" name="users" id="users-search-input" placeholder="--- Select Users ---" disabled>
                </div>
                <div class="dropdown" id="users-dropdown"></div>
            </div>
        </div>

        <script type="text/javascript">
            
            // --- CONFIGURATION ---
            const WORKATO_GROUPS_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/groups";
            const WORKATO_USER_GROUPS_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/user-groups"
            const WORKATO_USERS_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/groups/users";
            const WORKATO_ON_SUBMIT_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/form";
            const WORKATO_GET_USER_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/users";
            const WORKATO_API_TOKEN = "b2250c7091ab1096be02367b2304c9b427542f660a61433865bb3d9c0b6a8a65";

            const selected = new Map();
            let options = [];
            let scanning = false;
            let autoMode = true;
            let lastDetectedCode = null;

            // --- API CALLS ---

            async function getGroups() {
                try {
                    const res = await fetch(WORKATO_GROUPS_URL, { 
                        method: 'GET',
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        }
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const rawData = await res.json();
                    return rawData.Groups || []; 

                } catch(error) {
                    console.error("Group Fetch Failed:", error);
                    return [];
                }
            }

            async function getUserGroups(email) {
                try {
                    const res = await fetch(`${WORKATO_USER_GROUPS_URL}?email=${email}`, { 
                        method: 'GET',
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        }
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const rawData = await res.json();
                    return rawData.Groups || []; 

                } catch(error) {
                    console.error("User Group Fetch Failed:", error);
                    return [];
                }
            }

            async function getUsers(groupId) {
                try {
                    const workatoUsersEndpoint = `${WORKATO_USERS_URL}?groupId=${groupId}`;
                    const res = await fetch(workatoUsersEndpoint, { 
                        method: 'GET',
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const userData = await res.json();
                    return userData.Users || []; 

                } catch(error) {
                    console.error("User Fetch Failed:", error);
                    return [];
                }
            }

            async function getUserById(id) {
                try {
                    const workatoUserEndpoint = `${WORKATO_GET_USER_URL}/${id}`;
                    const res = await fetch(workatoUserEndpoint, { 
                        method: 'GET',
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const userData = await res.json();
                    return userData || {}; 

                } catch(error) {
                    console.error("User Fetch Failed:", error);
                    return [];
                }
            }

            // --- SCANNER FUNCTIONS ---

            async function startScanner() {
                if (scanning) return;
                document.getElementById("result").textContent = "No scan yet";

                Quagga.init({
                    inputStream: {
                        type: "LiveStream",
                        target: document.querySelector('#scanner'),
                        constraints: {
                            width: { min: 640, ideal: 1280 },
                            height: { min: 480, ideal: 720 },
                            facingMode: "environment",
                            aspectRatio: { min: 1, max: 2 }
                        }
                    },
                    locator: {
                        halfSample: true
                    },
                    decoder: {
                        readers: ["code_39_reader", "code_128_reader"]
                    }
                }, function(err) {
                    if (err) {
                        console.error(err);
                        alert("Camera error");
                        return;
                    }
                    Quagga.start();
                    scanning = true;
                });

                Quagga.onDetected(function(result) {
                    const code = result.codeResult.code;

                    lastDetectedCode = code;

                    if (autoMode) {
                        finalizeScan(code);
                    } else {
                        // Show preview only
                        document.getElementById("result").innerText = "Detected: " + code;
                    }
                });
            }

            async function toggleMode() {
                autoMode = !autoMode;

                document.getElementById("mode-label").innerText = autoMode ? "Auto" : "Manual";
                document.getElementById("scan-capture").style.display = autoMode ? "none" : "inline-block";
            }

            async function manualCapture() {
                if (!lastDetectedCode) {
                    alert("No barcode detected yet.");
                    return;
                }

                finalizeScan(lastDetectedCode);
            }

            async function finalizeScan(code) {
                document.getElementById("result").textContent = "Scanned: " + code;

                JFCustomWidget.sendData({ value: code });

                Quagga.stop();
                scanning = false;
                document.querySelector('#scanner').innerHTML = "";

                user = await getUserById(code);

                if(user && (!options || !options.map(o => o.external_id).includes(code))) {
                    options.push({
                        mail: user.user.mail,
                        name: `${user.user.firstName || ""} ${user.user.lastName || ""}`,
                        external_id: code
                    });
                    selected.set(code, {
                        mail: user.user.mail,
                        name: `${user.user.firstName || ""} ${user.user.lastName || ""}`,
                        external_id: code
                    });
                    renderDropdown(document.getElementById("users-dropdown"), document.getElementById("users-search-input"), "");
                    updateInputDisplay(input);
                }
            }

            // async function sendFormData(data) {
            //     try {
            //         const res = await fetch(WORKATO_ON_SUBMIT_URL, {
            //             method: "POST",
            //             headers: {
            //                 'api-token': WORKATO_API_TOKEN,

            //         return [];

            // }

            // --- UI HELPERS ---
            
            function populateDropdown(element, data, type) {
                element.innerHTML = `<option value="">-- Select a ${type} --</option>`;
                
                if (!data || data.length === 0) {
                    element.innerHTML = `<option value="">No ${type}s found</option>`;
                    return;
                }

                data.forEach(item => {
                    const opt = document.createElement('option');
                    switch(type) {
                        case "Form":
                            opt.value = item;
                            opt.text = item;
                        break;
                        case "User":
                            opt.value = item.id;
                            opt.text = `${item.mail} (${item.external_id})`;
                        break;
                        default:
                            opt.value = item._id;
                            opt.text = item.name;
                    }
                    element.appendChild(opt);
                });
                
                element.disabled = false;
            }

            function renderDropdown(dropdown, input, filter = "") {
                dropdown.innerHTML = "";

                const filtered = options.filter(opt =>
                    opt.mail.toLowerCase().includes(filter.toLowerCase()) ||
                    opt.external_id.toLowerCase().includes(filter.toLowerCase())
                );

                filtered.forEach(opt => {
                    const div = document.createElement("div");
                    div.className = "option";

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.checked = selected.has(opt.external_id);

                    const label = document.createElement("span");
                    label.textContent = `${opt.name} (${opt.external_id})`;

                    const toggle = () => {
                        if(selected.has(opt.external_id)) {
                            selected.delete(opt.external_id);
                            checkbox.checked = false;
                        } else {
                            selected.set(opt.external_id, {
                                mail: opt.mail,
                                name: opt.name,
                                external_id: opt.external_id
                            });
                            checkbox.checked = true;
                        }
                        updateInputDisplay(input);
                    };

                    div.addEventListener("click", (e) => {
                        // Prevent double toggle when clicking checkbox directly
                        if(e.target.tagName !== "INPUT") {
                            toggle();
                        }
                        JFCustomWidget.setFieldsValueByLabel([
                            { label: "Learner", value: [...selected.keys()].join(",") }
                        ]);
                    });

                    checkbox.addEventListener("change", toggle);

                    div.appendChild(checkbox);
                    div.appendChild(label);
                    dropdown.appendChild(div);
                });

                dropdown.style.display = filtered.length ? "block" : "none";
            }

            function updateInputDisplay(input) {
                const count = selected.size;

                if (count === 0) {
                    input.value = "";
                    input.placeholder = "--- Select Users ---";
                } else {
                    input.placeholder = `${count} selected`;
                }
            }

            // document.querySelector('#start-scan').addEventListener('click', async function() {
            //     await startScanner();
            // });

            // document.querySelector('#groups').addEventListener('change', async function() {
            //     const selectedGroupId = this.value;
                
            //     if (!selectedGroupId) {
            //         document.querySelector("#users-selected-box").disabled = true;
            //         document.querySelector("#users-search-input").innerHTML = '<option value="">-- Select a Group First --</option>';
            //         return;
            //     }

            //     document.querySelector("#forms").disabled = true;
            //     document.querySelector("#forms").innerHTML = '<option value="">Loading forms...</option>';
            //     populateDropdown(document.querySelector("#forms"), ["Pump Truck On The Job", "Personal Hygiene and Health"], "Form");
                
            //     document.getElementById("users-search-input").disabled = true;
            //     options = await getUsers(selectedGroupId);
            //     renderDropdown(document.getElementById("users-dropdown"), document.getElementById("users-search-input"), "");
            //     document.getElementById("users-search-input").disabled = false;
            // });

            // --- JOTFORM WIDGET INITIALIZATION ---

            JFCustomWidget.subscribe("ready", async function(data) {
                // --- WIDGET ELEMENTS ---
                const assessorInput = document.querySelector('#assessor');

                const groupSelect = document.querySelector('#groups');

                const usersDropdown = document.getElementById("users-dropdown");
                const usersInput = document.getElementById("users-search-input");
                const usersSelectedBox = document.getElementById("users-selected-box");
                const formSelect = document.querySelector('#forms');
                
                const scanBox = document.querySelector('#scanner');
                const scanBtn = document.querySelector('#start-scan');

                // Store prefilled email into widget
                JFCustomWidget.getFieldsValueByName(["assessor"], async function(res) {
                    items = (res && res.data) || [];
                    const groups = await getUserGroups(items[0].value);
                    populateDropdown(groupSelect, groups, "Group");
                });

                groupSelect.addEventListener('change', async function() {
                    const selectedGroupId = this.value;
                    
                    if (!selectedGroupId) {
                        usersInput.disabled = true;
                        usersInput.innerHTML = '<option value="">-- Select a Group First --</option>';
                        return;
                    }

                    formSelect.disabled = true;
                    formSelect.innerHTML = '<option value="">Loading forms...</option>';
                    populateDropdown(formSelect, ["Pump Truck On The Job", "Personal Hygiene and Health"], "Form");
                    
                    usersInput.disabled = true;
                    options = await getUsers(selectedGroupId);
                    renderDropdown(usersDropdown, usersInput, "");
                    usersInput.disabled = false;
                });

                formSelect.addEventListener('change', async function() {
                    JFCustomWidget.setFieldsValueByLabel([
                        { label: "Form", value: formSelect.value }
                    ]);
                });

                scanBtn.addEventListener('click', async function() {
                    await startScanner();
                });
                
                usersInput.addEventListener("focusout", () => {
                    usersInput.value = "";
                    renderDropdown(usersDropdown, usersInput, "");
                });

                usersInput.addEventListener("input", () => {
                    renderDropdown(usersDropdown, usersInput, usersInput.value);
                });

                // 3. Handle Form Submission
                JFCustomWidget.subscribe("submit", async function() {
                    const formData = {
                        assessor: assessorInput.value || "",
                        userId: [...selected.keys()].join(",") || [],
                        groupId: groupSelect.value || ""
                    }
                    const selectedValue = [...selected.keys()].join(",");
                    const result = {
                        valid: !!selectedValue,
                        value: selectedValue ? JSON.stringify(formData) : ""
                    };
                    // Send results to Workato
                    // if(result.valid) {
                    //     let submission = await sendFormData(formData);
                    // }
                    JFCustomWidget.sendSubmit(result);
                });
            });

        </script>
    </body>
</html>
