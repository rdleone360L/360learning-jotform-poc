<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>

        <style>
            #main { font-family: sans-serif; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
            input, select { width: 100%; max-width: 400px; padding: 8px 12px; border-radius: 4px; border: 1px solid #ccc; background-color: white; }
            label { font-weight: bold; font-size: 14px; margin-top: 5px; }
            #debug-info { margin-top: 10px; font-size: 11px; color: #d9534f; }
            #email { display: none }
        </style>
    </head>
    <body>
        <div id="main">
            <!-- <label for="email">Enter your 360Learning email:</label> -->
            <input type="email" id="email" name="email">

            <label for="groups">Select a Group:</label>
            <select name="groups" id="groups">
                <option value="">-- Loading Groups... --</option>
            </select>

            <label for="users">Select a User:</label>
            <select name="users" id="users" disabled>
                <option value="">-- Select a Group First --</option>
            </select>

            <label for="forms">Select a Form:</label>
            <select name="forms" id="forms" disabled>
                <option value="" selected>-- Select a Group First --</option>
                <option value="onboarding">Onboarding</option>
                <option value="safety">Safety</option>
            </select>
        </div>

        <script type="text/javascript">
            
            // --- CONFIGURATION ---
            const WORKATO_GROUPS_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/groups";
            const WORKATO_USER_GROUPS_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/user-groups"
            const WORKATO_USERS_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/groups/users";
            const WORKATO_ON_SUBMIT_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/form";
            const WORKATO_API_TOKEN = "b2250c7091ab1096be02367b2304c9b427542f660a61433865bb3d9c0b6a8a65";

            // --- API CALLS ---

            async function getGroups() {
                try {
                    const res = await fetch(WORKATO_GROUPS_URL, { 
                        method: 'GET',
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        }
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const rawData = await res.json();
                    return rawData.Groups || []; 

                } catch(error) {
                    console.error("Group Fetch Failed:", error);
                    return [];
                }
            }

            async function getUserGroups(email) {
                try {
                    const res = await fetch(`${WORKATO_USER_GROUPS_URL}?email=${email}`, { 
                        method: 'GET',
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        }
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const rawData = await res.json();
                    return rawData.Groups || []; 

                } catch(error) {
                    console.error("User Group Fetch Failed:", error);
                    return [];
                }
            }

            async function getUsers(groupId) {
                try {
                    const workatoUsersEndpoint = `${WORKATO_USERS_URL}?groupId=${groupId}`;
                    const res = await fetch(workatoUsersEndpoint, { 
                        method: 'GET',
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const userData = await res.json();
                    return userData.Users || []; 

                } catch(error) {
                    console.error("User Fetch Failed:", error);
                    return [];
                }
            }

            async function sendFormData(data) {
                try {
                    const res = await fetch(WORKATO_ON_SUBMIT_URL, {
                        method: "POST",
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ 
                            user_id: data.userId,
                            group_id: data.groupId,
                            tasks_completed: data.tasksCompleted
                        })
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                } catch(error) {
                    console.error("Form data export failed:", error);
                    return [];
                }
            }

            function storePrefillEmail(element) {
                JFCustomWidget.getFieldsValueByName(["email"], function(res) {
                    items = (res && res.data) || [];
                    element.value = items[0].value;
                    return items[0].value;
                });
            }

            // --- UI HELPERS ---
            
            function populateDropdown(element, data, type) {
                element.innerHTML = `<option value="">-- Select a ${type} --</option>`;
                
                if (!data || data.length === 0) {
                    element.innerHTML = `<option value="">No ${type}s found</option>`;
                    return;
                }

                data.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item._id; 
                    opt.text = item.mail || item.name || "Unknown"; 
                    element.appendChild(opt);
                });
                
                element.disabled = false;
            }

            function tasksCompleted(checkboxes) {
                for(el of checkboxes) {
                    if(!el.checked)
                        return false;
                }

                return true;
            }

            // --- JOTFORM WIDGET INITIALIZATION ---

            JFCustomWidget.subscribe("ready", async function(data) {
                // WIDGET ELEMENTS //
                const emailInput = document.querySelector('#email');
                const groupSelect = document.querySelector('#groups');
                const userSelect = document.querySelector('#users');
                const formSelect = document.querySelector('#forms');

                // HIDDEN FORM ELEMENTS //
                // storePrefillEmail(emailInput);
                JFCustomWidget.getFieldsValueByName(["email"], async function(res) {
                    items = (res && res.data) || [];
                    const groups = await getUserGroups(items[0].value);
                    populateDropdown(groupSelect, groups, "Group");
                });

                // let widget = new getdatatoiframe();
                // widget.init(data);

                // emailInput.addEventListener('change', async function() {
                //     const groups = await getUserGroups(this.value);
                //     populateDropdown(groupSelect, groups, "Group");
                // });

                // 2. Change Listener for Groups
                groupSelect.addEventListener('change', async function() {
                    const selectedGroupId = this.value;
                    
                    if (!selectedGroupId) {
                        userSelect.disabled = true;
                        userSelect.innerHTML = '<option value="">-- Select a Group First --</option>';
                        return;
                    }
                    
                    userSelect.disabled = true;
                    userSelect.innerHTML = '<option value="">Loading users...</option>';

                    formSelect.disabled = false;
                    
                    const users = await getUsers(selectedGroupId);
                    populateDropdown(userSelect, users, "User");
                });

                formSelect.addEventListener('change', async function() {
                    JFCustomWidget.setFieldsValueByLabel({
                        "Form" : formSelect.value
                    });
                });

                // 3. Handle Form Submission
                JFCustomWidget.subscribe("submit", async function() {
                    const tasks = document.querySelectorAll('[name="q7_tasksPerformed[]"]'); // Comes up empty, maybe widget can't see elements outside the iframe?
                    const formData = {
                        assessor: emailInput.value || "",
                        userId: userSelect.value || "",
                        groupId: groupSelect.value || "",
                        tasksCompleted: tasksCompleted(tasks)
                    }
                    const selectedValue = userSelect.value;
                    const result = {
                        valid: !!selectedValue,
                        value: selectedValue ? JSON.stringify(formData) : "" // This saves the User _id to the Jotform submission
                    };
                    // Send results to Workato
                    if(result.valid) {
                        let submission = await sendFormData(formData);
                    }
                    JFCustomWidget.sendSubmit(result);
                });
            });

        </script>
