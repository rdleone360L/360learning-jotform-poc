<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>

        <style>
            #main { font-family: sans-serif; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
            select, input { 
                width: 100%; max-width: 400px; padding: 8px 12px; border-radius: 4px; border: 1px solid #ccc; background-color: white; 
            }
            label { font-weight: bold; font-size: 14px; margin-top: 5px; }
            #debug-info { margin-top: 10px; font-size: 11px; color: #d9534f; }

            .dropdown {
                position: relative;
                width: 250px;
            }

            .dropdown input {
                width: 100%;
                padding: 8px;
                box-sizing: border-box;
            }

            .dropdown-list {
                position: absolute;
                width: 100%;
                border: 1px solid #ccc;
                max-height: 150px;
                overflow-y: auto;
                background: white;
                display: none;
                z-index: 1000;
            }

            .dropdown-item {
                padding: 8px;
                cursor: pointer;
            }

            .dropdown-item:hover {
                background: #eee;
            }
        </style>
    </head>
    <body>
        <div id="main">
            <!-- <label for="groups">Select a Group:</label>
            <select name="groups" id="groups" autocomplete="">
                <option value="">-- Loading Groups... --</option>
            </select> -->

            <div class="dropdown">
                <label for="groups-input">Select a Group:</label>
                <input type="text" id="groups-input" placeholder="-- Loading Groups.. --" autocomplete="off">
                <div id="groups-list" class="dropdown-list"></div>
            </div>

            <label for="users">Select a User:</label>
            <select name="users" id="users" disabled>
                <option value="">-- Select a Group First --</option>
            </select>

            <button id="submit-test">Submit</button>
            
            <div id="debug-info"></div>
        </div>

        <script type="text/javascript">
            
            // --- CONFIGURATION ---
            const WORKATO_GROUPS_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/groups";            
            const WORKATO_USERS_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/groups/users";
            const WORKATO_ON_SUBMIT_URL = "https://apim.eu.workato.com/360learning_eu/jotform-poc-v1/form";
            const WORKATO_API_TOKEN = "b2250c7091ab1096be02367b2304c9b427542f660a61433865bb3d9c0b6a8a65";

            // --- API CALLS ---

            async function getGroups() {
                try {
                    const res = await fetch(WORKATO_GROUPS_URL, { 
                        method: 'GET',
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        }
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const rawData = await res.json();
                    return rawData.Groups || []; 

                } catch(error) {
                    console.error("Group Fetch Failed:", error);
                    return [];
                }
            }

            async function getUsers(groupId) {
                try {
                    const workatoUsersEndpoint = `${WORKATO_USERS_URL}?groupId=${groupId}`;
                    const res = await fetch(workatoUsersEndpoint, { 
                        method: 'GET',
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const userData = await res.json();
                    return userData.Users || []; 

                } catch(error) {
                    console.error("User Fetch Failed:", error);
                    return [];
                }
            }

            async function sendFormData(data) {
                try {
                    const res = await fetch(WORKATO_ON_SUBMIT_URL, {
                        method: "POST",
                        headers: {
                            'api-token': WORKATO_API_TOKEN,
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ 
                            user_id: data.userId,
                            group_id: data.groupId
                        })
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                } catch(error) {
                    console.error("Form data export failed:", error);
                    return [];
                }
            }

            // --- UI HELPERS ---

            function populateDropdown(element, data, type) {
                element.innerHTML = `<option value="">-- Select a ${type} --</option>`;
                
                if (!data || data.length === 0) {
                    element.innerHTML = `<option value="">No ${type}s found</option>`;
                    return;
                }

                data.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item._id; 
                    opt.text = item.mail || item.name || "Unknown"; 
                    element.appendChild(opt);
                });
                
                element.disabled = false;
            }

            /**
             * Implements a searchable dropdown input that forces the user
             * to enter a value included in the specified options list.
             * @param {Node} inputEl - The input HTML element
             * @param {Node} listEl - The option list HTML element
             * @param {Array} options - The list of accepted options
             */ 
            function activateSearchableDropdown(inputEl, listEl, options) {
                let selectedValue = null;

                inputEl.addEventListener("input", () => {
                    const val = inputEl.value.toLowerCase();
                    listEl.innerHTML = "";
                    selectedValue = null;

                    const filtered = options.filter(opt => 
                        opt.toLowerCase().includes(val)
                    )

                    if(filtered.length === 0) { 
                        listEl.style.display = "none";
                        return;
                    }

                    filtered.forEach(opt => {
                        const div = document.createElement("div");
                        div.textContent = opt;
                        div.classList.add("dropdown-item");

                        div.addEventListener("click", () => {
                            inputEl.value = opt;
                            selectedValue = opt;
                            listEl.style.display = "none";
                        });

                        listEl.appendChild(div);
                    });

                    listEl.style.display = "block";
                });

                inputEl.addEventListener("blur", () => {
                    inputEl.value = "";
                })
            }

            // --- JOTFORM WIDGET INITIALIZATION ---

            JFCustomWidget.subscribe("ready", async function() {
                const groupSelect = document.querySelector('#groups');
                const userSelect = document.querySelector('#users');

                // 1. Load Groups
                const groups = await getGroups();
                populateDropdown(groupSelect, groups, "Group");

                // 2. Change Listener for Groups
                groupSelect.addEventListener('change', async function() {
                    const selectedGroupId = this.value;
                    
                    if (!selectedGroupId) {
                        userSelect.disabled = true;
                        userSelect.innerHTML = '<option value="">-- Select a Group First --</option>';
                        return;
                    }
                    
                    userSelect.disabled = true;
                    userSelect.innerHTML = '<option value="">Loading users...</option>';
                    
                    const users = await getUsers(selectedGroupId);
                    populateDropdown(userSelect, users, "User");
                });

                // 3. Handle Form Submission
                JFCustomWidget.subscribe("submit", function() {
                    const formData = {
                        userId: userSelect.value || "",
                        groupId: groupSelect.value || ""
                    }
                    const selectedValue = userSelect.value;
                    const result = {
                        valid: !!selectedValue,
                        value: selectedValue ? JSON.stringify(formData) : "" // This saves the User _id to the Jotform submission
                    };
                    // Send results to Workato
                    let submission = sendFormData(result.value);

                    JFCustomWidget.sendSubmit(result);
                });
            });

            // const groupSelect = document.querySelector('#groups');
            // const userSelect = document.querySelector('#users');
            // const submitBtn = document.querySelector("#submit-test");

            // groupSelect.value = "1234";
            // userSelect.value = "5678";
            // console.log(groupSelect.value);

            // submitBtn.addEventListener("click", async function() {
            //     await sendFormData({
            //         userId: groupSelect.value || "error",
            //         groupId: userSelect.value || "error"
            //     })
            // })

            const groupInput = document.querySelector("#groups-input");
            const groupList = document.querySelector("#groups-list");
            const options = ["Group A", "Group B", "Group C"];

            activateSearchableDropdown(groupInput, groupList, options);

        </script>
    </body>
</html>
